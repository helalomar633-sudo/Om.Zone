<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Om.Zone | التسجيل</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div style="display: flex; justify-content: center; align-items: center; height: 100vh;">
        <div style="background: var(--soft-black); padding: 40px; border: 2px solid var(--gold); border-radius: 15px; width: 400px; text-align: center;">
            <h1 style="color: var(--gold);">Om.Zone</h1>
            <p>منصة تعلم البرمجة من الصفر</p>
            <br>
            <form id="registerForm">
                <input type="text" placeholder="الاسم الأول" required>
                <input type="text" placeholder="اسم العيلة" required>
                <input type="email" placeholder="الايميل" required>
                <input type="text" maxlength="6" placeholder="الرمز (6 أرقام)" required>
                <button type="submit" class="btn-gold">إنشاء الحساب</button>
            </form>
        </div>
    </div>
</body>
</html>
