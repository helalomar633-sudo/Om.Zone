<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Om.Zone | بوابة التسجيل الفاخرة</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-container { display: flex; justify-content: center; align-items: center; height: 100vh; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); }
        .login-box { background: rgba(20, 20, 20, 0.95); padding: 50px 40px; border: 1px solid #d4af37; border-radius: 20px; width: 100%; max-width: 450px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        .login-box h1 { font-size: 40px; margin-bottom: 10px; background: linear-gradient(to bottom, #f9dfa5 0%, #d4af37 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .login-box p { color: #888; margin-bottom: 30px; font-size: 14px; letter-spacing: 1px; }
        .input-group { text-align: right; margin-bottom: 20px; }
        .input-group label { display: block; color: #d4af37; margin-bottom: 8px; font-size: 13px; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; outline: none; }
        input:focus { border-color: #d4af37; }
        .btn-gold { background: #d4af37; color: #000; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 8px; font-size: 18px; transition: 0.3s; }
        .btn-gold:hover { background: #f9dfa5; transform: scale(1.02); }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-box">
            <h1>Om.Zone</h1>
            <p>PLATFORM OF THE FUTURE</p>

            <form id="registrationForm">
                <div style="display: flex; gap: 10px;">
                    <div class="input-group">
                        <label>الاسم الأول</label>
                        <input type="text" id="fName" placeholder="عمر" required>
                    </div>
                    <div class="input-group">
                        <label>اسم العائلة</label>
                        <input type="text" id="lName" placeholder="علي" required>
                    </div>
                </div>
                <div class="input-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" id="email" placeholder="name@example.com" required>
                </div>
                <div class="input-group">
                    <label>رمز الدخول (6 أرقام)</label>
                    <input type="text" id="pincode" maxlength="6" pattern="\d{6}" placeholder="0 0 0 0 0 0" required>
                </div>
                <button type="submit" class="btn-gold">إنشاء الحساب</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('pincode').addEventListener('input', function (e) {
            this.value = this.value.replace(/[^0-9]/g, '');
        });

        document.getElementById('registrationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            localStorage.setItem('userName', document.getElementById('fName').value + " " + document.getElementById('lName').value);
            localStorage.setItem('studySeconds', 0);
            localStorage.setItem('chatHistory', JSON.stringify([])); 
            
            const btn = e.target.querySelector('button');
            btn.innerText = "جاري إعداد المنصة...";
            setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
        });
    </script>
</body>
</html>
